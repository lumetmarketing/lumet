*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--cream);color:var(--dark);min-height:100vh}

input,textarea,select{font-family:inherit;border:1.5px solid var(--gray-mid);border-radius:var(--radius);padding:10px 14px;font-size:14px;width:100%;outline:none;transition:border .2s;background:var(--white)}

textarea{resize:vertical;min-height:80px}

.btn-outline{border:1.5px solid var(--gray-mid);color:var(--gray)}.btn-outline:hover{border-color:var(--brown);color:var(--brown)}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-danger{background:var(--red);color:#fff}
.btn-success{background:var(--green);color:#fff}
.card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-mid);padding:22px;box-shadow:0 1px 4px rgba(61,31,0,.06);transition:box-shadow .2s}.card:hover{box-shadow:0 4px 16px rgba(61,31,0,.1)}
.modal-overlay{position:fixed;inset:0;background:rgba(26,10,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(3px)}

.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-mid);display:flex;gap:12px;justify-content:flex-end;background:var(--cream)}

}

function toast(msg,type='info'){
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;color:#fff;background:${type==='error'?'#B91C1C':type==='success'?'#2D7A3A':'#3D1F00'};box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:360px`;
  el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
}

function EditableField({value,onSave,placeholder='Clique para editar...',multiline=true}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(value||'');
  useEffect(()=>setVal(value||''),[value]);
  async function save(){setEditing(false);if(val!==value)await onSave(val);}
  if(editing)return(
    <div>
      {multiline?<textarea value={val} onChange={e=>setVal(e.target.value)} autoFocus style={{minHeight:100}} onBlur={save}/>:<input value={val} onChange={e=>setVal(e.target.value)} autoFocus onBlur={save} onKeyDown={e=>e.key==='Enter'&&save()}/>}
      <div style={{display:'flex',gap:8,marginTop:6}}>
        <button className="btn btn-primary btn-sm" onClick={save}>Salvar</button>
        <button className="btn btn-outline btn-sm" onClick={()=>{setEditing(false);setVal(value||'');}}>Cancelar</button>
      </div>
    </div>
  );
  return(
    <div className={`editable-field${!val?' empty':''}`} onClick={()=>setEditing(true)} title="Clique para editar">
      {val||placeholder}<span style={{fontSize:11,color:'#C8956C',marginLeft:8,opacity:.7}}>✏</span>
    </div>
  );
}

function AprovacaoPage({token}){
  const [cards,setCards]=useState([]);const [lote,setLote]=useState(null);
  const [loading,setLoading]=useState(true);const [reprovandoId,setReprovandoId]=useState(null);const [obs,setObs]=useState('');
  useEffect(()=>{
    async function load(){
      const {data:l}=await sb.from('aprovacao_lotes').select('*').eq('token',token).single();
      if(!l){setLoading(false);return;}setLote(l);
      const {data:lcs}=await sb.from('aprovacao_lote_cards').select('*,card:cards(*,midias:card_midias(*))').eq('lote_id',l.id);
      // Buscar nome do cliente
      if(l.cliente_id){const {data:cl}=await sb.from('clientes').select('nome,cor').eq('id',l.cliente_id).single();if(cl)setLote({...l,nome_cliente:cl.nome,cor_cliente:cl.cor});}
      setCards(lcs||[]);setLoading(false);
    }load();
  },[token]);
  async function aprovar(lcId,cardId,nomeCard){
    await sb.from('aprovacao_lote_cards').update({status:'aprovado',respondido_em:new Date().toISOString()}).eq('id',lcId);
    await sb.from('cards').update({aprovacao_status:'aprovado',status:'aprovado'}).eq('id',cardId);
    await sb.from('notificacoes').insert({titulo:`♥ Aprovado: ${nomeCard||'Conteúdo'}`,mensagem:`Cliente: ${lote?.nome_cliente||'—'} • Conteúdo: ${nomeCard||'—'} • Aprovado em ${new Date().toLocaleString('pt-BR')}`,tipo:'success'});
    setCards(cs=>cs.map(c=>c.id===lcId?{...c,status:'aprovado'}:c));toast('Aprovado!','success');
  }
  async function reprovar(lcId,cardId,nomeCard){
    if(!obs.trim()||obs.trim().length<5){toast('Descreva o motivo (mín. 5 caracteres)','error');return;}
    await sb.from('aprovacao_lote_cards').update({status:'reprovado',observacao_cliente:obs,respondido_em:new Date().toISOString()}).eq('id',lcId);

function App(){
  const params=new URLSearchParams(window.location.search);
  const aprovToken=params.get('aprovar');
  if(aprovToken)return<AprovacaoPage token={aprovToken}/>;
  const [page,setPage]=useState('dashboard');
  const [clienteId,setClienteId]=useState(null);
  const [funcionarios,setFuncionarios]=useState([]);
  const [clientes,setClientes]=useState([]);
  const [cards,setCards]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [notifUnread,setNotifUnread]=useState(0);
  useEffect(()=>{
    loadAll();
    const ch=sb.channel('rt').on('postgres_changes',{event:'*',schema:'public',table:'notificacoes'},loadNotifs).on('postgres_changes',{event:'*',schema:'public',table:'cards'},loadCards).on('postgres_changes',{event:'*',schema:'public',table:'checklist_items'},loadFuncs).subscribe();
    return()=>sb.removeChannel(ch);
  },[]);
  async function loadAll(){loadFuncs();loadClientes();loadCards();loadNotifs();}
  async function loadFuncs(){const {data}=await sb.from('funcionarios').select('*,observacao:funcionario_observacoes(*),checklist:checklist_items(*)').eq('status','ativo');setFuncionarios(data||[]);}
  async function loadClientes(){const {data}=await sb.from('clientes').select('*').eq('status','ativo');setClientes(data||[]);}
  async function loadCards(){const {data}=await sb.from('cards').select('*,midias:card_midias(*)');setCards(data||[]);}
  async function loadNotifs(){const {data}=await sb.from('notificacoes').select('*').order('created_at',{ascending:false}).limit(200);setNotifs(data||[]);setNotifUnread((data||[]).filter(n=>!n.lida).length);}
  function navTo(p,cid=null){setPage(p);if(cid)setClienteId(cid);}
  const currentCliente=clientes.find(c=>c.id===clienteId);
  return(
    <div style={{display:'flex'}}>
      <Sidebar page={page} navTo={navTo} notifUnread={notifUnread} notifs={notifs} loadNotifs={loadNotifs}/>
      <div className="main">
        {page==='dashboard'&&<Dashboard funcionarios={funcionarios} clientes={clientes} cards={cards} notifs={notifs} navTo={navTo} reload={loadAll}/>}
        {page==='clientes'&&<ClientesPage clientes={clientes} navTo={navTo} reload={loadClientes} funcionarios={funcionarios}/>}
        {page==='cliente'&&currentCliente&&<ClienteDetalhe cliente={currentCliente} cards={cards.filter(c=>c.cliente_id===clienteId)} funcionarios={funcionarios} reload={loadAll} navTo={navTo}/>}
        {page==='calendario'&&<CalendarioPage cards={cards} clientes={clientes}/>}
        {page==='equipe'&&<EquipePage funcionarios={funcionarios} reload={loadFuncs} clientes={clientes}/>}
        {page==='processos'&&<ProcessosPage/>}
        {page==='notificacoes'&&<NotificacoesPage notifs={notifs} reload={loadNotifs}/>}
      </div>
    </div>
  );
}

function Sidebar({page,navTo,notifUnread,notifs,loadNotifs}){
  const nav=[{key:'dashboard',icon:'DB',label:'Dashboard'},{key:'clientes',icon:'CL',label:'Clientes'},{key:'calendario',icon:'CA',label:'Calendario'},{key:'equipe',icon:'EQ',label:'Equipe'},{key:'processos',icon:'PR',label:'Processos'}];

function ProcessosPage(){

    {key:'arquetipo',num:2,titulo:'Arquetipo',desc:'Guia para identificacao e definicao do arquetipo da marca'},

    {key:'prompt_relatorio',num:5,titulo:'Prompt para Relatorio de Metricas',desc:'Prompt/descrição para gerar relatórios de métricas com IA'},
  ];

    const {error}=await sb.storage.from('midias').upload(path,file);

    const {data:{publicUrl}}=sb.storage.from('midias').getPublicUrl(path);

    if(ex){await sb.from('processos_conteudo').update({docs}).eq('id',ex.id);}
    else{const {data:r}=await sb.from('processos_conteudo').insert({etapa_key:key,docs}).select().single();if(r)setDados(d=>({...d,[key]:r}));setUploading(u=>({...u,[key]:false}));return;}
    setDados(d=>({...d,[key]:{...d[key],docs}}));setUploading(u=>({...u,[key]:false}));toast('Enviado!','success');
  }
  async function removeDoc(key,docId){

    await sb.from('processos_conteudo').update({docs}).eq('id',ex.id);setDados(d=>({...d,[key]:{...d[key],docs}}));toast('Removido!','success');
  }
  if(loading)return React.createElement('div',{style:{padding:40,textAlign:'center',color:'#7A6555',fontSize:14}},'Carregando...');
  return React.createElement('div',null,
    React.createElement('div',{className:'page-header'},React.createElement('div',null,React.createElement('div',{className:'page-title'},'Processos'),React.createElement('div',{className:'page-sub'},'Guia interno de etapas para a equipe'))),
    ETAPAS.map(etapa=>{
      const dado=dados[etapa.key]||{};const isOpen=!!expanded[etapa.key];const isPrompt=etapa.key==='prompt_relatorio';
      return React.createElement('div',{key:etapa.key,style:{background:'#fff',borderRadius:16,border:'1px solid #E5D5C5',overflow:'hidden',boxShadow:'0 1px 4px rgba(61,31,0,.06)',marginBottom:14}},
        React.createElement('div',{onClick:()=>setExpanded(e=>({...e,[etapa.key]:!e[etapa.key]})),style:{padding:'18px 22px',display:'flex',alignItems:'center',gap:14,cursor:'pointer',background:'#FAF3EC',borderBottom:isOpen?'1px solid #E5D5C5':'none'}},
          React.createElement('div',{style:{width:36,height:36,borderRadius:10,background:'#3D1F00',color:'#fff',fontWeight:700,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},etapa.num),
          React.createElement('div',{style:{flex:1}},React.createElement('div',{style:{fontWeight:700,color:'#2C1500',fontSize:15}},etapa.titulo),React.createElement('div',{style:{fontSize:12,color:'#7A6555',marginTop:2}},etapa.desc)),
          React.createElement('div',{style:{color:'#7A6555',fontSize:14,fontWeight:700,transform:isOpen?'rotate(180deg)':'none',transition:'transform .2s'}},'v')
        ),
        isOpen&&React.createElement('div',{style:{padding:24}},
          React.createElement('div',{style:{marginBottom:16}},
            React.createElement('label',{style:{display:'block',fontSize:11,fontWeight:700,color:'#7A6555',marginBottom:7,textTransform:'uppercase',letterSpacing:'.05em'}},isPrompt?'Prompt / Descrição':'Conteudo e instrucoes'),
            isPrompt&&React.createElement('div',{style:{background:'#FEF3C7',borderRadius:8,padding:'8px 12px',marginBottom:8,fontSize:12,color:'#92600A'}},'💡 Descreva aqui o prompt ou instruções para geração de relatórios de métricas com IA.'),
            React.createElement(EditableField,{value:dado.texto||'',onSave:v=>saveTexto(etapa.key,v),placeholder:isPrompt?'Descreva o prompt ou instruções para relatórios de métricas...':'Clique para adicionar instrucoes desta etapa...'})
          ),
          !isPrompt&&React.createElement('div',null,
            React.createElement('label',{style:{display:'block',fontSize:11,fontWeight:700,color:'#7A6555',marginBottom:7,textTransform:'uppercase',letterSpacing:'.05em'}},'Documentos'),
            (dado.docs||[]).map(doc=>React.createElement('div',{key:doc.id,style:{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',background:'#F5E6D3',borderRadius:10,marginBottom:8,border:'1px solid #E5D5C5'}},
              React.createElement('span',{style:{fontSize:11,fontWeight:700,color:'#3D1F00',background:'#EDD9C0',padding:'3px 8px',borderRadius:6,flexShrink:0}},'DOC'),

    })

function ProcessosAgencia(){

  useEffect(()=>{loadProcessos();},[]);

              <div style={{display:'flex',gap:4,flexShrink:0,flexDirection:'column'}}>
                <div style={{display:'flex',gap:4}}>
                  <button onClick={()=>moverOrdem(p.id,-1)} disabled={i===0} style={{padding:'3px 7px',borderRadius:6,border:'1px solid #E5D5C5',background:'#fff',color:'#7A6555',fontSize:12,opacity:i===0?.3:1}}>↑</button>
                  <button onClick={()=>moverOrdem(p.id,1)} disabled={i===processos.length-1} style={{padding:'3px 7px',borderRadius:6,border:'1px solid #E5D5C5',background:'#fff',color:'#7A6555',fontSize:12,opacity:i===processos.length-1?.3:1}}>↓</button>
                </div>
                <div style={{display:'flex',gap:4}}>
                  <button onClick={()=>{setEditando(p);setShowModal(true);}} style={{padding:'3px 7px',borderRadius:6,border:'1px solid #E5D5C5',background:'#fff',color:'#92600A',fontSize:12}}>Ed</button>
                  <button onClick={()=>deletar(p.id)} style={{padding:'3px 7px',borderRadius:6,border:'1px solid #FCA5A5',background:'#FEE2E2',color:'#B91C1C',fontSize:12}}>X</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
      {showModal&&<ProcessoModal processo={editando} onClose={()=>{setShowModal(false);setEditando(null);}} reload={loadProcessos} totalProcessos={processos.length}/>}
    </div>
  );
}

// ── CHECKLIST: tarefas vencidas agora têm check e delete ──
function FuncChecklistCard({func,reload,onDblClick}){
  const [novaTask,setNovaTask]=useState('');const [editingId,setEditingId]=useState(null);const [editText,setEditText]=useState('');
  const [obs,setObs]=useState(func.observacao?.[0]?.observacao||'');const [addingObs,setAddingObs]=useState(false);const [verDias,setVerDias]=useState(false);
  const [verFeitas,setVerFeitas]=useState(false);const [addingTask,setAddingTask]=useState(false);
  const hoje=new Date().toISOString().split('T')[0];
  const checklistHoje=(func.checklist||[]).filter(c=>c.data_tarefa===hoje);
  const checklistPassado=(func.checklist||[]).filter(c=>c.data_tarefa<hoje&&!c.concluido);
  const checklistFeitas=(func.checklist||[]).filter(c=>c.concluido);
  const concluidas=checklistHoje.filter(c=>c.concluido).length;
  async function addTask(){if(!novaTask.trim())return;await sb.from('checklist_items').insert({funcionario_id:func.id,titulo:novaTask,data_tarefa:hoje});setNovaTask('');reload();}
  async function toggleTask(item){
    const now=item.concluido?null:new Date().toISOString();
    await sb.from('checklist_items').update({concluido:!item.concluido,concluido_em:now}).eq('id',item.id);
    if(!item.concluido){
      await sb.from('notificacoes').insert({titulo:`✓ Tarefa concluída — ${func.nome}`,mensagem:`${func.nome} (${func.cargo||'Colaborador'}) concluiu: "${item.titulo}" às ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`,tipo:'success'});
    }
    reload();
  }
  async function deleteTask(id){await sb.from('checklist_items').delete().eq('id',id);reload();}
  async function saveEdit(id){if(!editText.trim())return;await sb.from('checklist_items').update({titulo:editText}).eq('id',id);setEditingId(null);setEditText('');reload();}
  async function salvarObs(){const ex=func.observacao?.[0];if(ex)await sb.from('funcionario_observacoes').update({observacao:obs,updated_at:new Date().toISOString()}).eq('id',ex.id);else await sb.from('funcionario_observacoes').insert({funcionario_id:func.id,observacao:obs});setAddingObs(false);reload();toast('Observação salva!','success');}

    <div className="func-card" onDoubleClick={onDblClick} style={{cursor:onDblClick?'pointer':'default'}} title={onDblClick?'Duplo clique para ver detalhes':''}>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:14}}>
        <div className="func-avatar">{func.nome.charAt(0)}</div>
        <div style={{flex:1}}><div style={{fontWeight:600,color:'#2C1500'}}>{func.nome}</div><div style={{fontSize:13,color:'#7A6555'}}>{func.cargo||'Colaborador'}</div><div style={{fontSize:11,color:'#A89080'}}>{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</div></div>
        <div style={{textAlign:'center',background:'#EDD9C0',borderRadius:8,padding:'6px 10px'}}><div style={{fontSize:18,fontWeight:700,color:'#3D1F00'}}>{concluidas}/{checklistHoje.length}</div><div style={{fontSize:10,color:'#6B3A1F'}}>hoje</div></div>
      </div>
      {checklistPassado.length>0&&(
        <div style={{background:'#FEE2E2',borderRadius:8,padding:'8px 10px',marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:600,color:'#B91C1C',cursor:'pointer',display:'flex',justifyContent:'space-between'}} onClick={()=>setVerDias(!verDias)}>⚠️ {checklistPassado.length} tarefa(s) em atraso {verDias?'▲':'▼'}</div>
          {verDias&&checklistPassado.map(item=>(
            <div key={item.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderTop:'1px solid #FCA5A5',marginTop:4}}>
              <div className="checklist-check" onClick={()=>toggleTask(item)} style={{borderColor:'#FCA5A5',flexShrink:0}}></div>
              <span style={{fontSize:12,color:'#B91C1C',flex:1}}>{item.titulo} <span style={{color:'#A89080',fontSize:10}}>({new Date(item.data_tarefa+'T12:00').toLocaleDateString('pt-BR')})</span></span>
              <button onClick={()=>toggleTask(item)} title="Concluir" style={{background:'#D4EDDA',color:'#2D7A3A',border:'none',borderRadius:6,padding:'2px 8px',fontSize:12,cursor:'pointer',fontWeight:600}}>✓</button>
              <button onClick={()=>deleteTask(item.id)} title="Apagar" style={{background:'#FEE2E2',color:'#B91C1C',border:'none',borderRadius:6,padding:'2px 8px',fontSize:12,cursor:'pointer',fontWeight:600}}>✕</button>
            </div>
          ))}
        </div>
      )}
      {checklistHoje.length>0&&<div style={{marginBottom:12}}>{checklistHoje.map(item=>(
        <div key={item.id} className="checklist-item">
          <div className={`checklist-check${item.concluido?' done':''}`} onClick={()=>toggleTask(item)}>{item.concluido&&'✓'}</div>
          {editingId===item.id?(<div style={{display:'flex',gap:6,flex:1}}><input value={editText} onChange={e=>setEditText(e.target.value)} style={{flex:1,fontSize:13,padding:'4px 8px'}} autoFocus onKeyDown={e=>e.key==='Enter'&&saveEdit(item.id)}/><button className="btn btn-primary btn-sm" onClick={()=>saveEdit(item.id)}>✓</button><button className="btn btn-outline btn-sm" onClick={()=>setEditingId(null)}>✕</button></div>):(
            <><span style={{fontSize:13,color:item.concluido?'#A89080':'#2C1500',textDecoration:item.concluido?'line-through':'none',flex:1}}>{item.titulo}</span>
            {item.concluido_em&&<span style={{fontSize:10,color:'#A89080'}}>{new Date(item.concluido_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</span>}
            <button onClick={()=>{setEditingId(item.id);setEditText(item.titulo);}} style={{color:'#92600A',fontSize:13,padding:'0 4px'}}>Ed</button>
            <button onClick={()=>deleteTask(item.id)} style={{color:'#B91C1C',fontSize:13,padding:'0 4px'}}>X</button></>
          )}
        </div>
      ))}</div>}
      {/* Tarefas concluídas histórico */}
      {checklistFeitas.length>0&&<div style={{marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:600,color:'#2D7A3A',cursor:'pointer',display:'flex',justifyContent:'space-between',padding:'6px 0',borderTop:'1px solid #E5D5C5'}} onClick={()=>setVerFeitas(!verFeitas)}>
          ✓ {checklistFeitas.length} concluída(s) {verFeitas?'▲':'▼'}
        </div>
        {verFeitas&&checklistFeitas.slice(0,10).map(item=>(
          <div key={item.id} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',opacity:.7}}>
            <div className="checklist-check done" style={{flexShrink:0}}>✓</div>
            <span style={{fontSize:12,color:'#A89080',textDecoration:'line-through',flex:1}}>{item.titulo}</span>
            {item.concluido_em&&<span style={{fontSize:10,color:'#A89080'}}>{new Date(item.concluido_em).toLocaleDateString('pt-BR')}</span>}
            <button onClick={()=>deleteTask(item.id)} style={{color:'#B91C1C',fontSize:11,padding:'0 3px',border:'none',background:'none',cursor:'pointer'}}>✕</button>
          </div>
        ))}
      </div>}
      {/* Adicionar nova tarefa */}
      {addingTask?(
        <div style={{display:'flex',gap:8,marginBottom:12}}>

          <button className="btn btn-primary btn-sm" onClick={addTask}>+</button>
          <button className="btn btn-outline btn-sm" onClick={()=>setAddingTask(false)}>✕</button>
        </div>

      {func.observacao?.[0]?.observacao&&!addingObs&&<div style={{background:'#FEF3C7',borderRadius:8,padding:10,marginBottom:8,fontSize:13,color:'#92600A',cursor:'pointer'}} onClick={()=>setAddingObs(true)}>📝 {func.observacao[0].observacao}</div>}
      {addingObs?(<div><textarea placeholder="Observação de melhoria..." value={obs} onChange={e=>setObs(e.target.value)} style={{marginBottom:8,fontSize:13}}/><div style={{display:'flex',gap:8}}><button className="btn btn-primary btn-sm" onClick={salvarObs}>Salvar</button><button className="btn btn-outline btn-sm" onClick={()=>setAddingObs(false)}>Cancelar</button></div></div>):(<button className="btn btn-outline btn-sm" style={{width:'100%',justifyContent:'center'}} onClick={()=>setAddingObs(true)}>{func.observacao?.[0]?.observacao?'Editar observação':'+ Observação de melhoria'}</button>)}
    </div>
  );
}

// ── CLIENTES: botão de apagar cliente + todo o kanban ──
function ClientesPage({clientes,navTo,reload,funcionarios}){
  const [showModal,setShowModal]=useState(false);
  async function apagarCliente(e,clienteId,nome){
    e.stopPropagation();
    if(!window.confirm(`Apagar "${nome}" e TODOS os seus conteúdos do kanban? Esta ação não pode ser desfeita.`))return;
    try{
      const {data:cc}=await sb.from('cards').select('id').eq('cliente_id',clienteId);
      if(cc&&cc.length>0){
        const ids=cc.map(c=>c.id);
        await sb.from('card_midias').delete().in('card_id',ids);
        await sb.from('aprovacao_lote_cards').delete().in('card_id',ids);
        await sb.from('cards').delete().eq('cliente_id',clienteId);
      }
      await sb.from('datas_comemorativas').delete().eq('cliente_id',clienteId);
      await sb.from('cliente_links').delete().eq('cliente_id',clienteId);
      await sb.from('cliente_docs').delete().eq('cliente_id',clienteId);
      await sb.from('clientes').delete().eq('id',clienteId);
      toast('Cliente apagado!','success');reload();
    }catch(err){toast('Erro ao apagar. Tente novamente.','error');}
  }
  return(
    <div>
      <div className="page-header"><div><div className="page-title">Clientes</div><div className="page-sub">{clientes.length} clientes ativos</div></div><button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Novo cliente</button></div>
      <div className="grid-3">{clientes.map(c=>(
        <div key={c.id} className="client-card" style={{borderTopColor:c.cor||'#8B5A2B',position:'relative'}} onClick={()=>navTo('cliente',c.id)}>
          <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:12}}>
            <div style={{width:44,height:44,borderRadius:10,background:c.cor+'22',color:c.cor,fontWeight:700,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>{c.nome.charAt(0)}</div>
            <div style={{flex:1}}><div style={{fontWeight:600,color:'#2C1500'}}>{c.nome}</div><div style={{fontSize:12,color:'#7A6555'}}>{c.segmento}</div></div>
          </div>
          {c.tom_de_voz&&<span className="tag">{c.tom_de_voz}</span>}
          <button onClick={e=>apagarCliente(e,c.id,c.nome)} style={{position:'absolute',top:10,right:10,background:'#FEE2E2',color:'#B91C1C',border:'1px solid #FCA5A5',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer'}}>Apagar</button>

  );

// ── CLIENTE MODAL: segmento personalizável ──
function ClienteModal({onClose,reload,funcionarios,cliente}){
  const [form,setForm]=useState({nome:cliente?.nome||'',segmento:cliente?.segmento||'',tom_de_voz:cliente?.tom_de_voz||'',briefing:cliente?.briefing||'',sobre:cliente?.sobre||'',estrategia:cliente?.estrategia||'',prompt_cliente:cliente?.prompt_cliente||'',arquetipos:cliente?.arquetipos||[],arquetipo_obs:cliente?.arquetipo_obs||'',cor:cliente?.cor||'#8B5A2B',responsavel_id:cliente?.responsavel_id||''});
  const [segCustom,setSegCustom]=useState(()=>{try{return JSON.parse(localStorage.getItem('lumet_segs_custom')||'[]');}catch{return[];}});
  const [novoSeg,setNovoSeg]=useState('');const [addSeg,setAddSeg]=useState(false);
  const todosSegs=[...SEGMENTOS_BASE,...segCustom];
  function criarSeg(){
    if(!novoSeg.trim())return;const n=novoSeg.trim().toLowerCase();
    if(todosSegs.includes(n)){toast('Segmento já existe','error');return;}
    const novo=[...segCustom,n];setSegCustom(novo);localStorage.setItem('lumet_segs_custom',JSON.stringify(novo));
    setForm({...form,segmento:n});setNovoSeg('');setAddSeg(false);toast('Segmento criado!','success');
  }
  async function salvar(){
    if(!form.nome.trim()){toast('Nome obrigatório','error');return;}
    const payload={...form};
    if(cliente){await sb.from('clientes').update(payload).eq('id',cliente.id);}
    else{
      const {data}=await sb.from('clientes').insert(payload).select().single();
      const seg=form.segmento?.toLowerCase();
      const esp=(DATAS_SEGMENTO[seg]||[]).map(d=>({cliente_id:data.id,titulo:d.t,data:`2026-${d.d}`,tipo:'segmento'}));
      const uni=DATAS_UNIVERSAIS.map(d=>({cliente_id:data.id,titulo:d.t,data:`2026-${d.d}`,tipo:'universal'}));
      if(esp.length||uni.length)await sb.from('datas_comemorativas').insert([...uni,...esp]);
      if(!DATAS_SEGMENTO[seg]&&seg)toast('Segmento novo: adicione as datas comemorativas manualmente na aba Datas do cliente.','info');
    }
    toast('Cliente salvo!','success');reload();onClose();
  }
  function toggleArq(a){const curr=form.arquetipos||[];if(curr.includes(a))setForm({...form,arquetipos:curr.filter(x=>x!==a)});else if(curr.length<3)setForm({...form,arquetipos:[...curr,a]});else toast('Máximo 3 arquétipos','error');}
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header"><h3 style={{fontSize:18,fontWeight:600}}>{cliente?'Editar cliente':'Novo cliente'}</h3><button onClick={onClose} style={{fontSize:20,color:'#7A6555'}}>✕</button></div>
        <div className="modal-body">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Nome *</label><input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Ex: Malta Marques Seguros"/></div>
            <div>
              <label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Segmento</label>
              <select value={form.segmento} onChange={e=>{if(e.target.value==='__novo__')setAddSeg(true);else{setForm({...form,segmento:e.target.value});setAddSeg(false);}}}>
                <option value="">Selecione...</option>
                {todosSegs.map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
                <option value="__novo__">➕ Adicionar novo segmento...</option>
              </select>
              {addSeg&&<div style={{marginTop:8,display:'flex',gap:8}}>
                <input value={novoSeg} onChange={e=>setNovoSeg(e.target.value)} placeholder="Nome do segmento..." style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&criarSeg()}/>
                <button className="btn btn-primary btn-sm" onClick={criarSeg}>Criar</button>
                <button className="btn btn-outline btn-sm" onClick={()=>{setAddSeg(false);setNovoSeg('');}}>✕</button>
              </div>}
              {addSeg&&<p style={{fontSize:11,color:'#7A6555',marginTop:4}}>⚠️ Para segmentos novos, adicione datas comemorativas manualmente na aba Datas do cliente.</p>}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:12}}>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Tom de voz</label><select value={form.tom_de_voz} onChange={e=>setForm({...form,tom_de_voz:e.target.value})}><option value="">Selecione...</option>{['Formal','Descontraído','Inspirador','Técnico','Jovem','Profissional','Acolhedor','Divertido'].map(t=><option key={t} value={t}>{t}</option>)}</select></div>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Cor</label><input type="color" value={form.cor} onChange={e=>setForm({...form,cor:e.target.value})} style={{height:42,padding:4}}/></div>
          </div>
          <div style={{marginTop:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:8}}>Arquétipos (até 3)</label><div style={{display:'flex',flexWrap:'wrap',gap:6}}>{Object.entries(ARQUETIPOS).map(([k,v])=><button key={k} onClick={()=>toggleArq(k)} style={{padding:'5px 12px',borderRadius:20,fontSize:12,fontWeight:500,border:'1.5px solid',borderColor:(form.arquetipos||[]).includes(k)?'#3D1F00':'#E5D5C5',background:(form.arquetipos||[]).includes(k)?'#3D1F00':'#fff',color:(form.arquetipos||[]).includes(k)?'#fff':'#7A6555',cursor:'pointer'}}>{v.emoji} {k}</button>)}</div></div>
          <div style={{marginTop:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Responsável</label><select value={form.responsavel_id} onChange={e=>setForm({...form,responsavel_id:e.target.value})}><option value="">Selecione...</option>{funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select></div>
        </div>
        <div className="modal-footer"><button className="btn btn-outline" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={salvar}>Salvar cliente</button></div>
      </div>
    </div>
  );
}

    <div>
      <div style={{marginBottom:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:8}}>Selecione até 3 arquétipos:</label>
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{Object.entries(ARQUETIPOS).map(([k,v])=><button key={k} onClick={()=>toggle(k)} style={{padding:'5px 12px',borderRadius:20,fontSize:12,fontWeight:500,border:'1.5px solid',borderColor:sel.includes(k)?'#3D1F00':'#E5D5C5',background:sel.includes(k)?'#3D1F00':'#fff',color:sel.includes(k)?'#fff':'#7A6555',cursor:'pointer'}}>{v.emoji} {k}</button>)}</div>
      </div>
      <div style={{display:'flex',gap:8}}><button className="btn btn-primary btn-sm" onClick={salvar}>Salvar</button><button className="btn btn-outline btn-sm" onClick={()=>{setEditando(false);setSel(arquetipos||[]);}}>Cancelar</button></div>
    </div>
  );
  return(
    <div>
      {arquetipos.map(a=>{const info=ARQUETIPOS[a];if(!info)return null;return(<div key={a} style={{background:'#FAF3EC',borderRadius:12,padding:16,marginBottom:12,borderLeft:'4px solid #8B5A2B'}}><div style={{fontSize:16,fontWeight:700,color:'#3D1F00',marginBottom:6}}>{info.emoji} {a}</div><div style={{fontSize:13,color:'#6B3A1F',lineHeight:1.7}}>{info.desc}</div></div>);})}
      <div style={{marginTop:8,marginBottom:12}}><div style={{fontSize:13,fontWeight:500,color:'#3D1F00',marginBottom:6}}>Observações:</div><EditableField value={arquetipo_obs} onSave={onSalvarObs} placeholder="Clique para adicionar observações..."/></div>
      <button className="btn btn-outline btn-sm" onClick={()=>{setSel(arquetipos||[]);setEditando(true);}}>✏ Editar arquétipos</button>
    </div>
  );
}

function ClienteDetalhe({cliente,cards,funcionarios,reload,navTo}){
  const [datas,setDatas]=useState([]);const [links,setLinks]=useState([]);
  const [showCardModal,setShowCardModal]=useState(false);const [editCard,setEditCard]=useState(null);
  const [showEditCliente,setShowEditCliente]=useState(false);
  const [selectedForLote,setSelectedForLote]=useState([]);const [loteLink,setLoteLink]=useState('');const [showLoteModal,setShowLoteModal]=useState(false);
  const [tab,setTab]=useState('kanban');
  const [novaData,setNovaData]=useState({titulo:'',data:''});const [addingData,setAddingData]=useState(false);
  const [estrategias,setEstrategias]=useState([]);const [metricas,setMetricas]=useState([]);
  const [uploadingEst,setUploadingEst]=useState(false);const [uploadingMet,setUploadingMet]=useState(false);
  const [mesSel,setMesSel]=useState('');const [mesSelMet,setMesSelMet]=useState('');
  useEffect(()=>{
    sb.from('datas_comemorativas').select('*').eq('cliente_id',cliente.id).then(({data})=>setDatas(data||[]));
    sb.from('cliente_links').select('*').eq('cliente_id',cliente.id).then(({data})=>setLinks(data||[]));
    sb.from('cliente_docs').select('*').eq('cliente_id',cliente.id).eq('tipo','estrategia').then(({data})=>setEstrategias(data||[]));
    sb.from('cliente_docs').select('*').eq('cliente_id',cliente.id).eq('tipo','metrica').then(({data})=>setMetricas(data||[]));
  },[cliente.id]);
  async function saveField(field,val){await sb.from('clientes').update({[field]:val}).eq('id',cliente.id);toast('Salvo!','success');reload();}
  async function salvarArquetipos(novos){await sb.from('clientes').update({arquetipos:novos}).eq('id',cliente.id);toast('Arquétipos salvos!','success');reload();}
  async function uploadDoc(file,tipo,mes=null){
    if(tipo==='estrategia')setUploadingEst(true);else setUploadingMet(true);
    const ext=file.name.split('.').pop();const path=`docs/${cliente.id}/${tipo}/${Date.now()}.${ext}`;
    const {error}=await sb.storage.from('midias').upload(path,file);
    if(error){toast('Erro no upload','error');setUploadingEst(false);setUploadingMet(false);return;}
    const {data:{publicUrl}}=sb.storage.from('midias').getPublicUrl(path);
    const {data:doc}=await sb.from('cliente_docs').insert({cliente_id:cliente.id,tipo,url:publicUrl,nome:file.name,mes}).select().single();
    if(tipo==='estrategia')setEstrategias(e=>[...e,doc]);else setMetricas(m=>[...m,doc]);
    setUploadingEst(false);setUploadingMet(false);setMesSel('');setMesSelMet('');toast('Arquivo enviado!','success');
  }
  async function deleteDoc(id,tipo){await sb.from('cliente_docs').delete().eq('id',id);if(tipo==='estrategia')setEstrategias(e=>e.filter(d=>d.id!==id));else setMetricas(m=>m.filter(d=>d.id!==id));toast('Removido!','success');}
  async function moverCard(cardId,novoStatus){await sb.from('cards').update({status:novoStatus}).eq('id',cardId);if(novoStatus==='publicado'){const cardObj=cards.find(c=>c.id===cardId);await sb.from('notificacoes').insert({titulo:`📢 Publicado: ${cardObj?.nome||'Conteúdo'}`,mensagem:`Cliente: ${cliente?.nome||'—'} • Conteúdo "${cardObj?.nome||'—'}" marcado como publicado`,tipo:'success'});}reload();}
  async function deletarCard(cardId){
    if(!window.confirm('Apagar este card?'))return;
    try{await sb.from('card_midias').delete().eq('card_id',cardId);await sb.from('aprovacao_lote_cards').delete().eq('card_id',cardId);const {error}=await sb.from('cards').delete().eq('id',cardId);if(error){toast('Erro ao apagar: '+error.message,'error');return;}toast('Card apagado!','success');await reload();}catch(e){toast('Erro ao apagar card.','error');}
  }
  const [loteCardsSel,setLoteCardsSel]=useState([]);
  async function gerarLote(){
    if(selectedForLote.length===0){toast('Selecione ao menos 1 conteúdo','error');return;}
    const cardsParaLote=cards.filter(c=>selectedForLote.includes(c.id));
    const {data:lote}=await sb.from('aprovacao_lotes').insert({cliente_id:cliente.id}).select().single();
    await sb.from('aprovacao_lote_cards').insert(selectedForLote.map(cid=>({lote_id:lote.id,card_id:cid})));
    const link=`${window.location.origin}${window.location.pathname}?aprovar=${lote.token}`;
    setLoteLink(link);setLoteCardsSel(cardsParaLote);setShowLoteModal(true);setSelectedForLote([]);toast('Link gerado!','success');
  }
  async function addData(){if(!novaData.titulo||!novaData.data){toast('Preencha título e data','error');return;}const {data:d}=await sb.from('datas_comemorativas').insert({cliente_id:cliente.id,titulo:novaData.titulo,data:novaData.data,tipo:'personalizada'}).select().single();setDatas([...datas,d]);setNovaData({titulo:'',data:''});setAddingData(false);toast('Data adicionada!','success');}
  async function removerData(id){await sb.from('datas_comemorativas').delete().eq('id',id);setDatas(datas.filter(d=>d.id!==id));}
  const dragCard=useRef(null);
  function onDragStart(cardId){dragCard.current=cardId;}
  async function onDrop(status){if(dragCard.current){await moverCard(dragCard.current,status);dragCard.current=null;}}
  const aguardando=cards.filter(c=>c.status==='aguardando');
  const arquetipos=Array.isArray(cliente.arquetipos)?cliente.arquetipos:[];
  return(
    <div>
      <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:20,flexWrap:'wrap'}}>
        <button className="btn btn-outline btn-sm" onClick={()=>navTo('clientes')}>← Voltar</button>
        <div style={{width:40,height:40,borderRadius:10,background:cliente.cor+'22',color:cliente.cor,fontWeight:700,fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}}>{cliente.nome.charAt(0)}</div>
        <div style={{flex:1}}><div style={{fontSize:20,fontWeight:700,color:'#2C1500'}}>{cliente.nome}</div><div style={{fontSize:13,color:'#7A6555'}}>{cliente.segmento}{cliente.tom_de_voz?` · ${cliente.tom_de_voz}`:''}</div></div>
        <button className="btn btn-outline btn-sm" onClick={()=>setShowEditCliente(true)}>✏ Editar</button>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditCard(null);setShowCardModal(true);}}>+ Conteúdo</button>
      </div>
      <div className="tabs">{[{k:'kanban',l:'Kanban'},{k:'sobre',l:'Sobre a empresa'},{k:'datas',l:'Datas'},{k:'links',l:'Referências'}].map(t=><div key={t.k} className={`tab${tab===t.k?' active':''}`} onClick={()=>setTab(t.k)}>{t.l}</div>)}</div>

      {tab==='sobre'&&(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="card"><div className="section-title">Sobre a empresa</div><EditableField value={cliente.sobre} onSave={v=>saveField('sobre',v)} placeholder="Clique para adicionar informações sobre a empresa..."/></div>
          <div className="card"><div className="section-title">Briefing</div><EditableField value={cliente.briefing} onSave={v=>saveField('briefing',v)} placeholder="Clique para adicionar o briefing..."/></div>
          {/* MUDANÇA 2: Arquétipo editável a qualquer momento */}
          <div className="card"><div className="section-title">Arquétipos</div><ArquetipoEditor arquetipos={arquetipos} onSalvar={salvarArquetipos} arquetipo_obs={cliente.arquetipo_obs} onSalvarObs={v=>saveField('arquetipo_obs',v)}/></div>
          {/* Estratégia Mensal */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div className="section-title" style={{marginBottom:0}}>Estratégia Mensal</div></div>
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'flex-end'}}>
              <div style={{flex:1,minWidth:160}}><label style={{display:'block',fontSize:12,fontWeight:500,marginBottom:4}}>Mês</label><select value={mesSel} onChange={e=>setMesSel(e.target.value)}><option value="">Selecione o mês...</option>{MESES.map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}</select></div>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:mesSel&&!uploadingEst?'pointer':'default',background:'#FAF3EC',border:'2px dashed #E5D5C5',borderRadius:10,padding:'10px 16px',color:'#7A6555',fontSize:13,whiteSpace:'nowrap'}}>{uploadingEst?'Enviando...':'📎 Upload PDF'}<input type="file" accept=".pdf,image/*" style={{display:'none'}} disabled={!mesSel||uploadingEst} onChange={e=>{if(e.target.files[0]&&mesSel)uploadDoc(e.target.files[0],'estrategia',mesSel);else if(!mesSel)toast('Selecione o mês primeiro','error');}}/></label>
            </div>
            {estrategias.length===0?<p style={{color:'#A89080',fontSize:14}}>Nenhuma estratégia enviada ainda.</p>:<div>{MESES.map((mes,i)=>{const ms=String(i+1).padStart(2,'0');const docs=estrategias.filter(e=>e.mes===ms);if(!docs.length)return null;return<div key={mes} style={{marginBottom:12}}><div style={{fontSize:13,fontWeight:600,color:'#3D1F00',marginBottom:6}}>{mes}</div>{docs.map(d=><div key={d.id} className="pdf-item"><span style={{fontSize:20}}>📄</span><a href={d.url} target="_blank" rel="noreferrer" style={{flex:1,fontSize:13,color:'#1D5FA8',fontWeight:500}}>{d.nome}</a><button onClick={()=>deleteDoc(d.id,'estrategia')} style={{color:'#B91C1C',fontSize:14}}>X</button></div>)}</div>;})} </div>}
          </div>
          {/* MUDANÇA 6: Relatório de Métricas com seleção de mês */}
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div className="section-title" style={{marginBottom:0}}>Relatório de Métricas</div></div>
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'flex-end'}}>
              <div style={{flex:1,minWidth:160}}><label style={{display:'block',fontSize:12,fontWeight:500,marginBottom:4}}>Mês do relatório</label><select value={mesSelMet} onChange={e=>setMesSelMet(e.target.value)}><option value="">Selecione o mês...</option>{MESES.map((m,i)=><option key={i} value={String(i+1).padStart(2,'0')}>{m}</option>)}</select></div>
              <label style={{display:'flex',alignItems:'center',gap:8,cursor:mesSelMet&&!uploadingMet?'pointer':'default',background:mesSelMet?'#3D1F00':'#A89080',color:'#fff',borderRadius:10,padding:'10px 16px',fontSize:13,fontWeight:500,whiteSpace:'nowrap',opacity:mesSelMet?1:.7}}>{uploadingMet?'Enviando...':'📊 Upload relatório'}<input type="file" accept=".pdf,image/*" style={{display:'none'}} disabled={!mesSelMet||uploadingMet} onChange={e=>{if(e.target.files[0]&&mesSelMet)uploadDoc(e.target.files[0],'metrica',mesSelMet);else if(!mesSelMet)toast('Selecione o mês primeiro','error');}}/></label>
            </div>
            {!mesSelMet&&<p style={{fontSize:12,color:'#A89080',marginBottom:8}}>Selecione o mês para fazer o upload do relatório.</p>}
            {metricas.length===0?<p style={{color:'#A89080',fontSize:14}}>Nenhum relatório enviado ainda.</p>:<div>{MESES.map((mes,i)=>{const ms=String(i+1).padStart(2,'0');const docs=metricas.filter(m=>m.mes===ms);if(!docs.length)return null;return<div key={mes} style={{marginBottom:12}}><div style={{fontSize:13,fontWeight:600,color:'#3D1F00',marginBottom:6}}>📊 {mes}</div>{docs.map(d=><div key={d.id} className="pdf-item"><span style={{fontSize:20}}>📊</span><a href={d.url} target="_blank" rel="noreferrer" style={{flex:1,fontSize:13,color:'#1D5FA8',fontWeight:500}}>{d.nome}</a><span style={{fontSize:11,color:'#A89080'}}>{new Date(d.created_at).toLocaleDateString('pt-BR')}</span><button onClick={()=>deleteDoc(d.id,'metrica')} style={{color:'#B91C1C',fontSize:14}}>X</button></div>)}</div>;})} </div>}
          </div>
          <div className="card"><div className="section-title">Prompt do cliente</div><div style={{background:'#FAF3EC',borderRadius:10,padding:4,marginBottom:8}}><p style={{fontSize:12,color:'#7A6555',padding:'4px 8px'}}>💡 Cole aqui o prompt ideal para usar no Claude ao criar conteúdo para este cliente</p></div><EditableField value={cliente.prompt_cliente} onSave={v=>saveField('prompt_cliente',v)} placeholder="Clique para adicionar o prompt ideal para este cliente..."/></div>
        </div>
      )}
      {tab==='links'&&<div className="card"><div className="section-title">Referências</div><LinkManager clienteId={cliente.id} links={links} setLinks={setLinks}/></div>}
      {tab==='datas'&&(
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div className="section-title" style={{marginBottom:0}}>Datas comemorativas</div><button className="btn btn-primary btn-sm" onClick={()=>setAddingData(true)}>+ Adicionar data</button></div>
          {addingData&&<div style={{background:'#FAF3EC',borderRadius:10,padding:16,marginBottom:16,display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}><div style={{flex:2,minWidth:140}}><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Título</label><input value={novaData.titulo} onChange={e=>setNovaData({...novaData,titulo:e.target.value})} placeholder="Ex: Dia do Cliente"/></div><div style={{flex:1,minWidth:120}}><label style={{fontSize:12,fontWeight:500,display:'block',marginBottom:4}}>Data</label><input type="date" value={novaData.data} onChange={e=>setNovaData({...novaData,data:e.target.value})}/></div><button className="btn btn-primary btn-sm" onClick={addData}>Salvar</button><button className="btn btn-outline btn-sm" onClick={()=>setAddingData(false)}>Cancelar</button></div>}
          {datas.length===0?<p style={{color:'#A89080',fontSize:14}}>Nenhuma data cadastrada.</p>:<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}}>{datas.sort((a,b)=>a.data.localeCompare(b.data)).map(d=><div key={d.id} style={{padding:12,background:d.tipo==='universal'?'#E8C9A8':d.tipo==='personalizada'?'#D4EDDA':'#EDD9C0',borderRadius:10,display:'flex',gap:10,alignItems:'center'}}><span style={{fontSize:18}}>📅</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:'#2C1500'}}>{d.titulo}</div><div style={{fontSize:11,color:'#7A6555'}}>{new Date(d.data+'T12:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})}</div></div><button onClick={()=>removerData(d.id)} style={{color:'#B91C1C',fontSize:14}}>X</button></div>)}</div>}
        </div>
      )}
      {tab==='kanban'&&(
        <>
          {aguardando.length>0&&<div className="card" style={{marginBottom:16,borderLeft:'4px solid #1D5FA8'}}><div style={{fontWeight:600,color:'#1D5FA8',marginBottom:8}}>Gerar link de aprovação em lote (até 10)</div><div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>{aguardando.map(c=><label key={c.id} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',background:selectedForLote.includes(c.id)?'#DBEAFE':'#FAF3EC',padding:'6px 12px',borderRadius:8,border:'1px solid',borderColor:selectedForLote.includes(c.id)?'#1D5FA8':'#E5D5C5',fontSize:13}}><input type="checkbox" checked={selectedForLote.includes(c.id)} onChange={e=>{if(e.target.checked&&selectedForLote.length<10)setSelectedForLote([...selectedForLote,c.id]);else setSelectedForLote(selectedForLote.filter(id=>id!==c.id));}}/>{c.nome}</label>)}</div><button className="btn btn-primary btn-sm" disabled={selectedForLote.length===0} onClick={gerarLote}>Gerar link ({selectedForLote.length} selecionado{selectedForLote.length!==1?'s':''})</button></div>}
          <div className="kanban-board">
            {STATUS_COLS.map(col=>{
              const colCards=cards.filter(c=>c.status===col.key);const colIdx=STATUS_COLS.findIndex(s=>s.key===col.key);
              return(
                <div key={col.key} className="kanban-col" onDragOver={e=>e.preventDefault()} onDrop={()=>onDrop(col.key)}>
                  <div className="kanban-col-header"><span className="kanban-col-title" style={{color:col.color}}>{col.label}</span><span className="kanban-col-count">{colCards.length}</span></div>
                  {colCards.map(card=>(
                    <div key={card.id} className="kanban-card" style={{borderLeftColor:col.color}} draggable onDragStart={()=>onDragStart(card.id)}>
                      {card.midias?.[0]&&(card.midias[0].tipo==='video'?<video src={card.midias[0].url} style={{width:'100%',height:70,objectFit:'cover',borderRadius:6,marginBottom:6}}/>:<img src={card.midias[0].url} alt="" className="kanban-card-img"/>)}
                      <div style={{fontSize:13,fontWeight:600,color:'#2C1500',marginBottom:6,cursor:'pointer'}} onClick={()=>{setEditCard(card);setShowCardModal(true);}}>{card.nome}</div>
                      <div style={{fontSize:11,color:'#7A6555',display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>{card.tipo_conteudo&&<span className="tag" style={{fontSize:10}}>{card.tipo_conteudo}</span>}{card.data_publicacao&&<span>{new Date(card.data_publicacao).toLocaleDateString('pt-BR')}</span>}</div>
                      {card.observacao_cliente&&<div style={{marginTop:4,background:'#FEE2E2',borderRadius:6,padding:6,fontSize:11,color:'#B91C1C'}}>✕ {card.observacao_cliente}</div>}
                      <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
                        {colIdx<STATUS_COLS.length-1&&<button className="btn btn-outline btn-sm" style={{fontSize:10,padding:'2px 7px'}} onClick={()=>moverCard(card.id,STATUS_COLS[colIdx+1].key)}>→</button>}
                        {colIdx>0&&<button className="btn btn-outline btn-sm" style={{fontSize:10,padding:'2px 7px'}} onClick={()=>moverCard(card.id,STATUS_COLS[colIdx-1].key)}>←</button>}
                        <button className="btn btn-outline btn-sm" style={{fontSize:10,padding:'2px 7px'}} onClick={()=>{setEditCard(card);setShowCardModal(true);}}>Ed</button>
                        <button onClick={()=>deletarCard(card.id)} style={{fontSize:10,padding:'2px 7px',background:'#FEE2E2',color:'#B91C1C',border:'1px solid #FCA5A5',borderRadius:6,cursor:'pointer',fontWeight:500}}>Apagar</button>
                      </div>
                    </div>
                  ))}
                  <button className="btn btn-outline btn-sm" style={{width:'100%',justifyContent:'center',marginTop:8,fontSize:12}} onClick={()=>{setEditCard({status:col.key,cliente_id:cliente.id});setShowCardModal(true);}}>+ Adicionar</button>
                </div>
              );
            })}
          </div>
        </>
      )}
      {showCardModal&&<CardModal card={editCard} clienteId={cliente.id} funcionarios={funcionarios} onClose={()=>{setShowCardModal(false);setEditCard(null);}} reload={reload}/>}
      {showEditCliente&&<ClienteModal cliente={cliente} onClose={()=>setShowEditCliente(false)} reload={reload} funcionarios={funcionarios}/>}
      {showLoteModal&&<LoteModal loteLink={loteLink} loteCards={loteCardsSel} cliente={cliente} onClose={()=>setShowLoteModal(false)}/>}
    </div>
  );
}

function LinkManager({clienteId,links,setLinks}){
  const [url,setUrl]=useState('');const [desc,setDesc]=useState('');
  async function add(){if(!url.trim())return;const {data}=await sb.from('cliente_links').insert({cliente_id:clienteId,url,descricao:desc}).select().single();setLinks([...links,data]);setUrl('');setDesc('');}
  async function remove(id){await sb.from('cliente_links').delete().eq('id',id);setLinks(links.filter(l=>l.id!==id));}
  return(
    <div>
      {links.map(l=><div key={l.id} style={{display:'flex',gap:10,alignItems:'center',padding:'8px 0',borderBottom:'1px solid #E5D5C5'}}><a href={l.url} target="_blank" rel="noreferrer" style={{flex:1,fontSize:13,color:'#1D5FA8'}}>{l.descricao||l.url}</a><button onClick={()=>remove(l.id)} style={{color:'#B91C1C',fontSize:16}}>✕</button></div>)}
      <div style={{display:'flex',gap:8,marginTop:12}}><input placeholder="URL" value={url} onChange={e=>setUrl(e.target.value)} style={{flex:2}}/><input placeholder="Descrição" value={desc} onChange={e=>setDesc(e.target.value)} style={{flex:1}}/><button className="btn btn-primary btn-sm" onClick={add}>+</button></div>
    </div>
  );
}

function CardModal({card,clienteId,funcionarios,onClose,reload}){
  const isEdit=card?.id;
  const [form,setForm]=useState({nome:card?.nome||'',tipo_conteudo:card?.tipo_conteudo||'post',legenda:card?.legenda||'',texto_arte:card?.texto_arte||'',data_publicacao:card?.data_publicacao?.split('T')[0]||'',responsavel_id:card?.responsavel_id||'',observacoes_internas:card?.observacoes_internas||'',status:card?.status||'ideia',cliente_id:clienteId});
  const [midias,setMidias]=useState([]);const [uploading,setUploading]=useState(false);
  useEffect(()=>{if(isEdit)sb.from('card_midias').select('*').eq('card_id',card.id).then(({data})=>setMidias(data||[]));},[ card?.id]);
  async function uploadMidia(file){setUploading(true);const ext=file.name.split('.').pop();const path=`cards/${Date.now()}.${ext}`;const {error}=await sb.storage.from('midias').upload(path,file);if(error){toast('Erro no upload','error');setUploading(false);return;}const {data:{publicUrl}}=sb.storage.from('midias').getPublicUrl(path);const tipo=file.type.startsWith('video')?'video':'imagem';if(isEdit){const {data:m}=await sb.from('card_midias').insert({card_id:card.id,url:publicUrl,tipo,nome:file.name}).select().single();setMidias([...midias,m]);}else setMidias([...midias,{url:publicUrl,tipo,nome:file.name,_temp:true}]);setUploading(false);}
  async function salvar(){if(!form.nome.trim()){toast('Nome obrigatório','error');return;}const payload={...form,data_publicacao:form.data_publicacao?new Date(form.data_publicacao+'T12:00:00').toISOString():null};if(isEdit){await sb.from('cards').update(payload).eq('id',card.id);}else{const {data:novo}=await sb.from('cards').insert(payload).select().single();const temps=midias.filter(m=>m._temp);if(temps.length)await sb.from('card_midias').insert(temps.map((m,i)=>({card_id:novo.id,url:m.url,tipo:m.tipo,nome:m.nome,ordem:i})));}toast('Conteúdo salvo!','success');reload();onClose();}
  async function removeMidia(id){await sb.from('card_midias').delete().eq('id',id);setMidias(midias.filter(m=>m.id!==id));}
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

        <div className="modal-header"><h3 style={{fontSize:18,fontWeight:600}}>{isEdit?'Editar conteúdo':'Novo conteúdo'}</h3><button onClick={onClose} style={{fontSize:20,color:'#7A6555'}}>✕</button></div>
        <div className="modal-body">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Título do conteúdo *</label><input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Ex: Post dia das mães"/></div>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Tipo</label><select value={form.tipo_conteudo} onChange={e=>setForm({...form,tipo_conteudo:e.target.value})}>{['post','stories','reels','carrossel','video'].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}</select></div>
          </div>
          <div style={{marginTop:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Texto na arte</label><input value={form.texto_arte||''} onChange={e=>setForm({...form,texto_arte:e.target.value})} placeholder="Texto que aparecerá na arte/imagem do conteúdo"/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:12}}>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Data de publicação</label><input type="date" value={form.data_publicacao} onChange={e=>setForm({...form,data_publicacao:e.target.value})}/></div>
            <div><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Coluna kanban</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{STATUS_COLS.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}</select></div>
          </div>
          <div style={{marginTop:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Responsável</label><select value={form.responsavel_id} onChange={e=>setForm({...form,responsavel_id:e.target.value})}><option value="">Selecione...</option>{funcionarios.map(f=><option key={f.id} value={f.id}>{f.nome}</option>)}</select></div>
          <div style={{marginTop:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Legenda (opcional)</label><textarea value={form.legenda} onChange={e=>setForm({...form,legenda:e.target.value})} placeholder="Texto da publicação..."/></div>
          <div style={{marginTop:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Observações internas</label><textarea value={form.observacoes_internas} onChange={e=>setForm({...form,observacoes_internas:e.target.value})} placeholder="Notas da equipe (não visíveis ao cliente)"/></div>
          <div style={{marginTop:12}}>
            <label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Imagens / Vídeos ({midias.length}/10)</label>
            {midias.length>0&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>{midias.map((m,i)=><div key={m.id||i} style={{position:'relative',width:80,height:80}}>{m.tipo==='video'?<video src={m.url} style={{width:80,height:80,objectFit:'cover',borderRadius:8}}/>:<img src={m.url} alt="" style={{width:80,height:80,objectFit:'cover',borderRadius:8}}/>}{m.id&&<button onClick={()=>removeMidia(m.id)} style={{position:'absolute',top:-6,right:-6,background:'#B91C1C',color:'#fff',border:'none',borderRadius:'50%',width:20,height:20,fontSize:11,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>}</div>)}</div>}

      </div>
    </div>
  );
}

// ── GRÁFICO PIZZA ──
function PizzaChart({data}){
  const total=data.reduce((s,d)=>s+d.val,0);
  if(total===0)return<div style={{textAlign:'center',color:'#A89080',fontSize:13,padding:20}}>Sem dados de tarefas ainda</div>;
  let angle=0;
  const slices=data.map(d=>{const pct=d.val/total;const start=angle;angle+=pct*360;return{...d,start,pct};});
  function polar(deg,r){const rad=(deg-90)*Math.PI/180;return{x:100+r*Math.cos(rad),y:100+r*Math.sin(rad)};}
  function arc(s,e,r=78){
    if(e-s>=360)e=359.99;
    const a=polar(s,r);const b=polar(e,r);const lg=e-s>180?1:0;
    return`M100,100 L${a.x},${a.y} A${r},${r} 0 ${lg},1 ${b.x},${b.y} Z`;
  }
  return(
    <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
      <svg viewBox="0 0 200 200" width={170} height={170}>
        {slices.map((s,i)=><path key={i} d={arc(s.start,s.start+s.pct*360)} fill={s.color} stroke="#fff" strokeWidth={2.5}/>)}
        <circle cx={100} cy={100} r={42} fill="#fff"/>
        <text x={100} y={96} textAnchor="middle" fontSize={13} fontWeight={700} fill="#3D1F00">{total}</text>
        <text x={100} y={111} textAnchor="middle" fontSize={10} fill="#7A6555">tarefas</text>
      </svg>
      <div>
        {data.map((d,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <div style={{width:14,height:14,borderRadius:4,background:d.color,flexShrink:0}}/>
            <span style={{fontSize:13,color:'#2C1500',flex:1,minWidth:120}}>{d.label}</span>
            <span style={{fontSize:14,fontWeight:700,color:d.color,minWidth:28,textAlign:'right'}}>{d.val}</span>
            <span style={{fontSize:11,color:'#A89080',minWidth:36}}>({total?Math.round(d.val/total*100):0}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function FuncModal({func,onClose,reload}){
  const [form,setForm]=useState({nome:func?.nome||'',cargo:func?.cargo||'',email:func?.email||''});
  const [salvando,setSalvando]=useState(false);
  async function salvar(){
    if(!form.nome.trim()){toast('Nome obrigatório','error');return;}
    setSalvando(true);
    if(func){
      await sb.from('funcionarios').update(form).eq('id',func.id);
      toast('Funcionário atualizado!','success');
    }else{
      await sb.from('funcionarios').insert(form);
      // Notificação interna para toda a equipe
      await sb.from('notificacoes').insert({
        titulo:`Novo membro na equipe: ${form.nome} 👋`,
        mensagem:`${form.nome}${form.cargo?' ('+form.cargo+')':''} foi adicionado(a) à equipe.${form.email?' Email: '+form.email:''}`,
        tipo:'info'
      });
      if(form.email){
        toast(`✉️ Notificação registrada! Configure uma Edge Function no Supabase para envio de emails reais para ${form.email}.`,'success');
      }else{
        toast('Funcionário adicionado! Equipe notificada.','success');
      }
    }
    setSalvando(false);reload();onClose();
  }
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header"><h3 style={{fontSize:18,fontWeight:600}}>{func?'Editar':'Novo'} funcionário</h3><button onClick={onClose} style={{fontSize:20,color:'#7A6555'}}>✕</button></div>
        <div className="modal-body">
          <div style={{marginBottom:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Nome *</label><input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Nome do colaborador"/></div>
          <div style={{marginBottom:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>Cargo</label><input value={form.cargo} onChange={e=>setForm({...form,cargo:e.target.value})} placeholder="Ex: Designer, Social Media"/></div>
          <div style={{marginBottom:12}}><label style={{display:'block',fontSize:13,fontWeight:500,marginBottom:6}}>E-mail</label><input type="email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@agencia.com"/></div>
          {!func&&(
            <div style={{background:form.email?'#D4EDDA':'#FEF3C7',borderRadius:8,padding:12,fontSize:13,color:form.email?'#2D7A3A':'#92600A'}}>
              {form.email?`✉️ Ao salvar, a equipe receberá uma notificação interna sobre o novo membro. Para envio de email real para ${form.email}, configure uma Edge Function no Supabase.`:'💡 Adicione um e-mail para incluí-lo na notificação de boas-vindas.'}
            </div>
          )}
        </div>
        <div className="modal-footer"><button className="btn btn-outline" onClick={onClose}>Cancelar</button><button className="btn btn-primary" onClick={salvar} disabled={salvando}>{salvando?'Salvando...':'Salvar'}</button></div>
      </div>
    </div>
  );
}


// ── NOTIF PANEL: notificações clicáveis que abrem modal ──
function NotifPanel({notifs,onClose}){
  const [detalhe,setDetalhe]=useState(null);
  function icone(tipo){return tipo==='success'?'✓':tipo==='warning'?'!':'ℹ';}
  function cor(tipo){return tipo==='success'?'#2D7A3A':tipo==='warning'?'#B91C1C':'#3D1F00';}
  function bg(tipo){return tipo==='success'?'#D4EDDA':tipo==='warning'?'#FEE2E2':'#E8C9A8';}
  // Extrair partes da mensagem (Cliente: X • Conteúdo: Y • ...)
  function parseMensagem(msg){
    if(!msg)return{texto:msg,partes:[]};
    const partes=msg.split('•').map(p=>p.trim()).filter(Boolean);
    return{partes};
  }
  return(
    <div className="notif-panel">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,paddingBottom:8,borderBottom:'1px solid #E5D5C5'}}>
        <span style={{fontSize:12,fontWeight:700,color:'#3D1F00',textTransform:'uppercase',letterSpacing:'.05em'}}>Notificações</span>
        <span style={{fontSize:11,color:'#A89080'}}>{notifs.length} total</span>
      </div>
      {notifs.length===0
        ?<p style={{fontSize:13,color:'#7A6555',textAlign:'center',padding:16}}>Sem notificações</p>
        :notifs.slice(0,20).map(n=>{
          const {partes}=parseMensagem(n.mensagem);
          return(
            <div key={n.id} onClick={()=>setDetalhe(n)}
              style={{padding:'10px 8px',borderBottom:'1px solid #F0E8E0',opacity:n.lida?.7:1,cursor:'pointer',borderRadius:8,transition:'background .15s',display:'flex',gap:8,alignItems:'flex-start'}}
              onMouseEnter={e=>e.currentTarget.style.background='#FAF3EC'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:26,height:26,borderRadius:'50%',background:bg(n.tipo),color:cor(n.tipo),fontWeight:700,fontSize:12,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{icone(n.tipo)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:cor(n.tipo),marginBottom:2}}>{n.titulo}</div>
                {partes.length>0
                  ?partes.map((p,i)=><div key={i} style={{fontSize:11,color:'#6B3A1F',marginBottom:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p}</div>)
                  :<div style={{fontSize:11,color:'#7A6555',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{n.mensagem}</div>
                }
                <div style={{fontSize:10,color:'#A89080',marginTop:3}}>{new Date(n.created_at).toLocaleString('pt-BR')}</div>
              </div>
            </div>
          );
        })
      }
      {detalhe&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setDetalhe(null)} style={{zIndex:2000}}>
          <div className="modal" style={{maxWidth:460}}>
            <div className="modal-header" style={{borderLeft:`4px solid ${cor(detalhe.tipo)}`}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <div style={{width:32,height:32,borderRadius:'50%',background:bg(detalhe.tipo),color:cor(detalhe.tipo),fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{icone(detalhe.tipo)}</div>
                <h3 style={{fontSize:16,fontWeight:700,color:cor(detalhe.tipo)}}>{detalhe.titulo}</h3>
              </div>
              <button onClick={()=>setDetalhe(null)} style={{fontSize:20,color:'#7A6555'}}>✕</button>
            </div>
            <div className="modal-body">
              {/* Quebrar mensagem em partes para melhor leitura */}
              {parseMensagem(detalhe.mensagem).partes.length>0
                ?<div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                  {parseMensagem(detalhe.mensagem).partes.map((p,i)=>{
                    const [label,valor]=p.includes(':')?p.split(':',2):['',p];
                    return(
                      <div key={i} style={{background:'#FAF3EC',borderRadius:8,padding:'8px 12px'}}>
                        {label&&<div style={{fontSize:10,fontWeight:700,color:'#7A6555',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>{label.trim()}</div>}
                        <div style={{fontSize:14,color:'#2C1500',fontWeight:valor?500:400}}>{valor?valor.trim():p}</div>
                      </div>
                    );
                  })}
                </div>
                :<p style={{fontSize:14,color:'#2C1500',lineHeight:1.7,marginBottom:16}}>{detalhe.mensagem}</p>
              }
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{background:bg(detalhe.tipo),color:cor(detalhe.tipo),padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:600}}>{detalhe.tipo==='success'?'Sucesso':detalhe.tipo==='warning'?'Atenção':'Info'}</span>

          </div>
        </div>
      )}
    </div>
  );
}

    const now=item.concluido?null:new Date().toISOString();
    await sb.from('checklist_items').update({concluido:!item.concluido,concluido_em:now}).eq('id',item.id);

  );
}

// ── PÁGINA COMPLETA DE NOTIFICAÇÕES ──
function NotificacoesPage({notifs,reload}){
  const [filtro,setFiltro]=useState('todos');
  const [busca,setBusca]=useState('');
  const [detalhe,setDetalhe]=useState(null);

  function icone(tipo){return tipo==='success'?'✓':tipo==='warning'?'✕':'ℹ';}
  function cor(tipo){return tipo==='success'?'#2D7A3A':tipo==='warning'?'#B91C1C':'#3D1F00';}
  function bg(tipo){return tipo==='success'?'#D4EDDA':tipo==='warning'?'#FEE2E2':'#E8C9A8';}
  function bgLight(tipo){return tipo==='success'?'#F0FFF4':tipo==='warning'?'#FFF5F5':'#FAF3EC';}

  function parseMensagem(msg){
    if(!msg)return[];
    return msg.split('•').map(p=>p.trim()).filter(Boolean);
  }

  async function apagarNotif(id){
    await sb.from('notificacoes').delete().eq('id',id);
    reload();
  }
  async function apagarTodas(){
    if(!window.confirm('Apagar todo o histórico de notificações?'))return;
    await sb.from('notificacoes').delete().neq('id','00000000-0000-0000-0000-000000000000');
    reload();
  }
  async function marcarTodasLidas(){
    await sb.from('notificacoes').update({lida:true}).eq('lida',false);
    reload();
  }

  const filtradas=notifs.filter(n=>{
    const matchFiltro=filtro==='todos'||(filtro==='success'&&n.tipo==='success')||(filtro==='warning'&&n.tipo==='warning')||(filtro==='nao_lidas'&&!n.lida);
    const matchBusca=!busca||(n.titulo||'').toLowerCase().includes(busca.toLowerCase())||(n.mensagem||'').toLowerCase().includes(busca.toLowerCase());
    return matchFiltro&&matchBusca;
  });

  const totalSuccess=notifs.filter(n=>n.tipo==='success').length;
  const totalWarning=notifs.filter(n=>n.tipo==='warning').length;
  const totalNaoLidas=notifs.filter(n=>!n.lida).length;

  // Agrupar por data
  function agruparPorData(lista){
    const grupos={};
    lista.forEach(n=>{
      const d=new Date(n.created_at);
      const hoje=new Date();const ontem=new Date();ontem.setDate(ontem.getDate()-1);
      let label=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      if(d.toDateString()===hoje.toDateString())label='Hoje';
      else if(d.toDateString()===ontem.toDateString())label='Ontem';
      if(!grupos[label])grupos[label]=[];
      grupos[label].push(n);
    });
    return grupos;
  }
  const grupos=agruparPorData(filtradas);

  return(
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Notificações</div>
          <div className="page-sub">{notifs.length} no histórico · {totalNaoLidas} não lidas</div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {totalNaoLidas>0&&<button className="btn btn-outline btn-sm" onClick={marcarTodasLidas}>Marcar todas como lidas</button>}
          {notifs.length>0&&<button className="btn btn-outline btn-sm" style={{color:'#B91C1C',borderColor:'#FCA5A5'}} onClick={apagarTodas}>Limpar histórico</button>}
        </div>
      </div>

      {/* Resumo por tipo */}
      <div className="grid-4" style={{marginBottom:20}}>
        {[
          {v:notifs.length,l:'Total',c:'#3D1F00',f:'todos',bg:'#FAF3EC'},
          {v:totalSuccess,l:'Aprovações / Conclusões',c:'#2D7A3A',f:'success',bg:'#D4EDDA'},
          {v:totalWarning,l:'Reprovações / Alertas',c:'#B91C1C',f:'warning',bg:'#FEE2E2'},
          {v:totalNaoLidas,l:'Não lidas',c:'#92600A',f:'nao_lidas',bg:'#FEF3C7'},
        ].map((s,i)=>(
          <div key={i} onClick={()=>setFiltro(filtro===s.f?'todos':s.f)} style={{background:filtro===s.f?s.bg:'#fff',borderRadius:12,border:`2px solid ${filtro===s.f?s.c:'#E5D5C5'}`,padding:'16px 20px',cursor:'pointer',transition:'all .2s'}}>
            <div style={{fontSize:28,fontWeight:700,color:s.c}}>{s.v}</div>
            <div style={{fontSize:12,color:'#7A6555',marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Busca */}
      <div style={{marginBottom:20,position:'relative'}}>
        <input
          placeholder="Buscar em notificações..."
          value={busca} onChange={e=>setBusca(e.target.value)}
          style={{paddingLeft:36,background:'#fff',border:'1.5px solid #E5D5C5',borderRadius:10}}
        />
        <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#A89080',fontSize:14}}>🔍</span>
        {busca&&<button onClick={()=>setBusca('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#A89080',fontSize:16,border:'none',background:'none',cursor:'pointer'}}>✕</button>}
      </div>

      {/* Lista agrupada por data */}
      {filtradas.length===0
        ?<div className="card" style={{textAlign:'center',padding:'48px 0',color:'#A89080'}}>
          <div style={{fontSize:40,marginBottom:12}}>🔔</div>
          <div style={{fontSize:15,fontWeight:600}}>Nenhuma notificação encontrada</div>
          {busca&&<div style={{fontSize:13,marginTop:4}}>Tente buscar por outro termo</div>}
        </div>
        :Object.entries(grupos).map(([data,lista])=>(
          <div key={data} style={{marginBottom:24}}>
            <div style={{fontSize:11,fontWeight:700,color:'#7A6555',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
              <div style={{flex:1,height:1,background:'#E5D5C5'}}/>
              {data}
              <div style={{flex:1,height:1,background:'#E5D5C5'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {lista.map(n=>(
                <div key={n.id}
                  style={{background:n.lida?'#fff':bgLight(n.tipo),border:`1px solid ${n.lida?'#E5D5C5':cor(n.tipo)+'44'}`,borderLeft:`4px solid ${cor(n.tipo)}`,borderRadius:12,padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start',cursor:'pointer',transition:'all .2s'}}
                  onClick={()=>setDetalhe(n)}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow='0 2px 12px rgba(61,31,0,.1)'}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}
                >
                  <div style={{width:32,height:32,borderRadius:'50%',background:bg(n.tipo),color:cor(n.tipo),fontWeight:700,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{icone(n.tipo)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                      <div style={{fontSize:14,fontWeight:700,color:cor(n.tipo)}}>{n.titulo}</div>
                      {!n.lida&&<span style={{background:cor(n.tipo),color:'#fff',borderRadius:20,padding:'1px 7px',fontSize:10,fontWeight:600,flexShrink:0}}>nova</span>}
                    </div>
                    {/* Partes da mensagem */}
                    {parseMensagem(n.mensagem).map((p,i)=>(
                      <div key={i} style={{fontSize:12,color:'#6B3A1F',marginBottom:2}}>{p}</div>
                    ))}
                    <div style={{fontSize:11,color:'#A89080',marginTop:4}}>{new Date(n.created_at).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
                  </div>
                  <button
                    onClick={e=>{e.stopPropagation();apagarNotif(n.id);}}
                    style={{color:'#C8956C',fontSize:16,padding:'0 4px',border:'none',background:'none',cursor:'pointer',flexShrink:0,opacity:.6}}
                    title="Apagar esta notificação"
                  >✕</button>
                </div>
              ))}
            </div>
          </div>
        ))
      }

      {/* Modal de detalhe */}
      {detalhe&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setDetalhe(null)}>
          <div className="modal" style={{maxWidth:480}}>
            <div className="modal-header" style={{borderLeft:`4px solid ${cor(detalhe.tipo)}`}}>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <div style={{width:34,height:34,borderRadius:'50%',background:bg(detalhe.tipo),color:cor(detalhe.tipo),fontWeight:700,fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{icone(detalhe.tipo)}</div>
                <h3 style={{fontSize:16,fontWeight:700,color:cor(detalhe.tipo)}}>{detalhe.titulo}</h3>
              </div>
              <button onClick={()=>setDetalhe(null)} style={{fontSize:20,color:'#7A6555'}}>✕</button>
            </div>
            <div className="modal-body">
              <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                {parseMensagem(detalhe.mensagem).map((p,i)=>{
                  const [label,valor]=p.includes(':')?p.split(':',2):['',p];
                  return(
                    <div key={i} style={{background:'#FAF3EC',borderRadius:8,padding:'10px 14px'}}>
                      {label&&<div style={{fontSize:10,fontWeight:700,color:'#7A6555',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>{label.trim()}</div>}
                      <div style={{fontSize:14,color:'#2C1500',fontWeight:500}}>{valor?valor.trim():p}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <span style={{background:bg(detalhe.tipo),color:cor(detalhe.tipo),padding:'3px 12px',borderRadius:20,fontSize:11,fontWeight:600}}>{detalhe.tipo==='success'?'Sucesso':detalhe.tipo==='warning'?'Atenção':'Info'}</span>
                <span style={{fontSize:12,color:'#A89080'}}>{new Date(detalhe.created_at).toLocaleString('pt-BR')}</span>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline btn-sm" style={{color:'#B91C1C',borderColor:'#FCA5A5'}} onClick={()=>{apagarNotif(detalhe.id);setDetalhe(null);}}>Apagar</button>
              <button className="btn btn-primary" onClick={()=>setDetalhe(null)}>Fechar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
